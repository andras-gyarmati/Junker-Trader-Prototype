<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Junker Trader Prototype</title>
  <style>
    body { font-family: monospace; margin: 12px; background: #f4f4f4; }
    h1, h2, h3 { margin: 0 0 8px 0; }
    .topbar { margin-bottom: 12px; padding: 8px; background: #fff; border: 1px solid #ccc; }
    .panel { display: none; background: #fff; border: 1px solid #ccc; padding: 12px; margin-bottom: 10px; }
    .panel.active { display: block; }
    .card { border: 1px solid #aaa; padding: 8px; margin-bottom: 8px; background: #fafafa; }
    button { margin: 4px 4px 4px 0; }
    .log { white-space: pre-line; background: #111; color: #0f0; padding: 8px; min-height: 120px; }
    .small { color: #666; font-size: 12px; }
    .graphs { background: #fff; border: 1px solid #ccc; padding: 12px; margin-bottom: 10px; }
    .graph-wrap { margin-bottom: 10px; }
    svg { background: #fafafa; border: 1px solid #bbb; width: 100%; max-width: 700px; height: 130px; }
  </style>
</head>
<body>
  <h1>Junker Trader Prototype</h1>

  <div class="topbar" id="topbar"></div>

  <section id="market-panel" class="panel active">
    <h2>Market</h2>
    <div id="buyer-forecast" class="card"></div>
    <div id="market-cars"></div>
    <button id="to-garage-from-market-btn">Go To Garage</button>
    <button id="next-day-btn">End Day</button>
    <p class="small">No direct market estimate shown. Use your own sale history notebook.</p>
  </section>

  <section id="negotiation-panel" class="panel">
    <h2>Negotiation</h2>
    <div id="negotiation-content"></div>
    <button id="offer-lowball">Lowball</button>
    <button id="offer-fair">Fair Offer</button>
    <button id="offer-asking">Pay Asking</button>
    <button id="walk-away">Walk Away</button>
  </section>

  <section id="garage-panel" class="panel">
    <h2>Garage / Inventory</h2>
    <div id="inventory-list"></div>
    <div id="garage-content"></div>
    <div id="repair-actions"></div>
    <button id="inspect-btn">Inspect</button>
    <button id="sell-quick-btn">Sell Quick</button>
    <button id="sell-fair-btn">Sell Fair</button>
    <button id="sell-premium-btn">Sell Premium</button>
    <button id="to-market-from-garage-btn">Back To Market</button>
  </section>

  <section id="sale-panel" class="panel">
    <h2>Sale Result</h2>
    <div id="sale-content"></div>
    <button id="continue-btn">Continue</button>
  </section>

  <section class="graphs">
    <h3>Run Graphs</h3>
    <div class="graph-wrap">
      <div class="small">Money Balance</div>
      <svg id="money-graph" viewBox="0 0 700 130" preserveAspectRatio="none"></svg>
    </div>
    <div class="graph-wrap">
      <div class="small">Total Spent</div>
      <svg id="spent-graph" viewBox="0 0 700 130" preserveAspectRatio="none"></svg>
    </div>
    <div class="graph-wrap">
      <div class="small">Total Profit</div>
      <svg id="profit-graph" viewBox="0 0 700 130" preserveAspectRatio="none"></svg>
    </div>
  </section>

  <section>
    <h3>Event Log</h3>
    <div id="event-log" class="log"></div>
  </section>

  <script src="game.js"></script>
</body>
</html>
